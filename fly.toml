# fly.toml
app = "pousada-api"  # Nome único para seu app

[build]
  # Usar o Dockerfile
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Manter sempre ativo
  auto_start_machines = true

[[vm]]
  memory = "256mb"  # Mínimo suficiente
  cpu_kind = "shared"
  cpus = 1

# Configurações de health check
[[checks]]
  port = 8080
  type = "http"
  path = "/api/health"
  interval = "15s"
  timeout = "2s"

