# fly.toml app configuration file generated for pousada-backend on 2026-07-16T02:03:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pousada-backend'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
